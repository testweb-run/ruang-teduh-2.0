<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Crayon/sketch effect filter -->
    <filter id="crayon" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="4" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
  
  <g filter="url(#crayon)">
    <!-- Sun/Warmth behind -->
    <circle cx="75" cy="30" r="15" fill="#FFF7E8" stroke="#FF7BAC" stroke-width="2" stroke-dasharray="3 3"/>
    
    <!-- Roof -->
    <polygon points="50,15 15,45 85,45" fill="#FF7BAC" stroke="#243B6B" stroke-width="3" stroke-linejoin="round"/>
    
    <!-- House body -->
    <rect x="22" y="45" width="56" height="40" rx="8" fill="#A7D8FF" stroke="#243B6B" stroke-width="3" stroke-linejoin="round"/>
    
    <!-- Door -->
    <rect x="42" y="58" width="16" height="27" rx="4" fill="#FFF7E8" stroke="#243B6B" stroke-width="3"/>
    
    <!-- Window with smiley face -->
    <circle cx="38" cy="34" r="8" fill="#FFF7E8" stroke="#243B6B" stroke-width="2"/>
    <path d="M35,34 Q38,37 41,34" fill="none" stroke="#243B6B" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Cute heart above chimney -->
    <path d="M72,12 C70,8 65,8 65,12 C65,16 72,20 72,20 C72,20 79,16 79,12 C79,8 74,8 72,12 Z" fill="#6BCB77" stroke="#243B6B" stroke-width="2"/>
    
    <!-- Ground line -->
    <path d="M5,88 Q50,83 95,88" fill="none" stroke="#243B6B" stroke-width="3.5" stroke-linecap="round"/>
    
    <!-- Little grass doodle -->
    <path d="M10,88 L12,80 L15,88" fill="none" stroke="#6BCB77" stroke-width="2" stroke-linecap="round"/>
    <path d="M88,88 L90,78 L93,88" fill="none" stroke="#6BCB77" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
